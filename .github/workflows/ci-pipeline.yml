name: .NET API CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kildekode
        uses: actions/checkout@v4

      - name: Opsæt .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Byg koden
        run: dotnet build --no-restore

      - name: Kør Unit Tests
        run: dotnet test --no-build --verbosity normal

      - name: Installer Newman
        run: npm install -g newman

      - name: Start API i baggrunden
        run: |
          nohup dotnet run --project src/RESTbooks/RESTbooks/RESTbooks.csproj > api.log 2>&1 &
        env:
          ASPNETCORE_URLS: http://localhost:5144

      - name: Vent på at API'et er klar
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5144; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          echo "API failed to start"
          cat api.log
          exit 1

      - name: Kør Postman Tests
        run: newman run postman-tests/api-tests.json --env-var "baseUrl=http://localhost:5144"

      - name: Vis API log ved fejl
        if: failure()
        run: cat api.log